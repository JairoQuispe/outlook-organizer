<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outlook Organizer - Configuración</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div class="app-layout">
      <!-- Panel Lateral Izquierdo (Sidebar) -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Outlook Organizer</h2>
        </div>
        <nav class="sidebar-menu">
          <button class="menu-item active" id="btn-automatizar">
            <span class="icon">⚙️</span> Automatizar Respaldo
          </button>
          <button class="menu-item" id="btn-escanear">
            <span class="icon">🔎</span> Escanear Buzón
          </button>
        </nav>
      </aside>

      <!-- Panel de Contenido Derecho -->
      <main class="content-area">
        <header class="content-header">
          <h1 id="content-title">Automatizar Respaldo</h1>
          <p class="subtitle" id="content-subtitle">Gestione la automatización de sus respaldos de Outlook.</p>
        </header>

        <!-- SECCIÓN: Automatizar Respaldo -->
        <section class="content-body" id="automation-section">
          
          <!-- VISTA 1: Estado Vacío (Sin configuración) -->
          <div id="empty-state" class="empty-state">
            <div class="empty-icon">📁</div>
            <h3>Sin Automatizaciones Activas</h3>
            <p>Aún no ha configurado ninguna automatización de respaldo para sus archivos de Outlook.</p>
            <button id="btn-create-automation" class="primary-btn-large">Crear Automatización</button>
          </div>

          <!-- VISTA 2: Asistente por pasos (Wizard) - se carga dinámicamente desde wizard.html -->
          <div id="wizard-container"></div>

          <!-- VISTA 3: Lista de Automatizaciones Activas -->
          <div id="automation-list" class="hidden">
            <div class="list-header">
              <h3>Mis Automatizaciones</h3>
              <button id="btn-create-from-list" class="primary-btn">+ Nueva</button>
            </div>
            <div id="automation-cards"></div>
          </div>
        </section>

        <!-- SECCIÓN: Escanear Buzón - se carga dinámicamente desde scan.html -->
        <section class="content-body hidden" id="scan-section"></section>
      </main>
    </div>
  </body>
</html>
